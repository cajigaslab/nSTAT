name: MATLAB Parity Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity-gate:
    # Requires a self-hosted macOS runner with MATLAB installed at:
    # /Applications/MATLAB_R2025b.app/bin/matlab
    runs-on: [self-hosted, macOS]
    env:
      RUNNER_TOOL_CACHE: /Users/iahncajigas/actions-runner/_work/_tool
      AGENT_TOOLSDIRECTORY: /Users/iahncajigas/actions-runner/_work/_tool
      RUNNER_TEMP: /Users/iahncajigas/actions-runner/_work/_temp
      TMPDIR: /Users/iahncajigas/actions-runner/_work/_temp
      NSTAT_MATLAB_EXTRA_ARGS: -maca64 -nodisplay -noFigureWindows
      NSTAT_FORCE_M_HELP_SCRIPTS: "1"
    steps:
      - name: Prepare runner directories
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE" "$RUNNER_TEMP" /Users/iahncajigas/actions-runner/_work

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: MATLAB smoke preflight
        run: /Applications/MATLAB_R2025b.app/bin/matlab -maca64 -nodisplay -noFigureWindows -batch "disp(version); exit"

      - name: Pull LFS Objects
        run: git lfs pull

      - name: Show Python runtime
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install package and dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ./python[dev]

      - name: Generate docs/notebooks/parity prerequisites
        run: |
          python3 python/tools/generate_help_topic_docs.py
          python3 python/tools/generate_example_notebooks.py
          python3 python/tools/generate_method_parity_matrix.py
          python3 python/tools/generate_implemented_method_coverage.py

      - name: Run MATLAB/Python similarity gate
        run: |
          python3 python/tools/verify_python_vs_matlab_similarity.py --enforce-gate

      - name: Freeze similarity baseline
        if: ${{ always() && !cancelled() }}
        run: |
          if [ -f python/reports/python_vs_matlab_similarity_report.json ]; then
            python3 python/tools/freeze_similarity_baseline.py
          else
            echo "Similarity report missing; skipping baseline freeze."
          fi

      - name: Upload parity reports
        if: ${{ always() && !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: nstat-matlab-parity-reports
          if-no-files-found: warn
          path: |
            python/reports/python_vs_matlab_similarity_report.json
            python/reports/python_vs_matlab_similarity_baseline.json
