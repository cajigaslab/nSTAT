name: MATLAB Smoke

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matlab-smoke:
    runs-on: [self-hosted, macOS]
    steps:
      - name: Print MATLAB version
        run: /Applications/MATLAB_R2025b.app/bin/matlab -batch "disp(version); exit"
