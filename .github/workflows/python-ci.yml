name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python[dev]

      - name: Generate docs/notebooks/parity reports
        run: |
          python python/tools/generate_help_topic_docs.py
          python python/tools/generate_example_notebooks.py
          python python/tools/freeze_port_baseline.py
          python python/tools/generate_method_parity_matrix.py
          python python/tools/generate_implemented_method_coverage.py

      - name: Validate notebooks
        run: |
          python python/tools/verify_examples_notebooks.py

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html python/docs python/docs/_build/html

      - name: Run offline standalone check (quick)
        run: |
          python python/tools/verify_offline_standalone.py

      - name: Run pytest
        run: |
          cd python
          python -m pytest -q

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: nstat-python-reports
          path: python/reports/*.json
