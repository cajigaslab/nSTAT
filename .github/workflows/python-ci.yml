name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS Objects
        run: git lfs pull

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python[dev]

      - name: Generate docs/notebooks/parity reports
        run: |
          python python/tools/generate_help_topic_docs.py
          python python/tools/generate_example_notebooks.py
          python python/tools/freeze_port_baseline.py
          python python/tools/generate_method_parity_matrix.py
          python python/tools/generate_implemented_method_coverage.py

      - name: Validate notebooks
        run: |
          python python/tools/verify_examples_notebooks.py

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html python/docs python/docs/_build/html

      - name: Run offline standalone check (quick)
        run: |
          python python/tools/verify_offline_standalone.py

      - name: Run pytest
        id: pytest
        continue-on-error: true
        env:
          NSTAT_CI_LIGHT: "1"
        run: |
          cd python
          mkdir -p reports
          set -o pipefail
          python -m pytest -vv --maxfail=1 --durations=20 --junitxml=reports/pytest.xml 2>&1 | tee reports/pytest.log

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nstat-python-reports
          path: |
            python/reports/*.json
            python/reports/pytest.xml
            python/reports/pytest.log

      - name: Enforce pytest pass
        if: steps.pytest.outcome == 'failure'
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          xml_path = Path("python/reports/pytest.xml")
          log_path = Path("python/reports/pytest.log")

          if xml_path.exists():
              root = ET.parse(xml_path).getroot()
              emitted = False
              for testcase in root.iter("testcase"):
                  failures = list(testcase.findall("failure")) + list(testcase.findall("error"))
                  if not failures:
                      continue
                  emitted = True
                  case_id = f"{testcase.attrib.get('classname', '')}.{testcase.attrib.get('name', '')}".strip(".")
                  for fail in failures:
                      msg = (fail.attrib.get("message", "") or "pytest failure").replace("\n", " ").strip()
                      print(f"::error title={case_id}::{msg}")
                      text = (fail.text or "").strip()
                      if text:
                          print(text[:3000])
              if not emitted:
                  print("::error title=pytest::Pytest failed without testcase-level failures in junit XML")
          else:
              print("::error title=pytest::Missing python/reports/pytest.xml")

          if log_path.exists():
              tail = log_path.read_text(encoding="utf-8", errors="ignore")[-4000:]
              print("---- pytest.log tail ----")
              print(tail)
          PY
          exit 1
